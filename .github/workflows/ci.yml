# Agrobot TOM v2 — CI
#
# Builds and tests pure-Python targets (no torch/CUDA deps).
#
# Why not //perception/...?
#   dino_sam2_detector transitively pulls torch, which on Linux resolves CUDA
#   wheels (nvidia_nvtx_cu12, etc.) that aren't in our Mac-generated CPU lock
#   file. Until we maintain per-platform lock files, we scope CI to the targets
#   that work hermetically on any runner: image_utils (numpy + opencv only).

name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Bazel
        uses: bazel-contrib/setup-bazel@0.8.0
        with:
          bazelisk-cache: true

      - name: Build image_utils
        run: bazel build //perception:image_utils

      - name: Run perception unit tests
        run: bazel test //perception:image_utils_test --test_output=errors
